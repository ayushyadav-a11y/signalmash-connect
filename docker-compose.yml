# =============================================
# SignalMash Connect - Docker Compose (Development)
# =============================================
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: signalmash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: signalmash
      POSTGRES_PASSWORD: signalmash_dev_password
      POSTGRES_DB: signalmash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalmash -d signalmash"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: signalmash-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: signalmash-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://signalmash:signalmash_dev_password@postgres:5432/signalmash
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_production
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      SIGNALMASH_API_KEY: ${SIGNALMASH_API_KEY}
      SIGNALMASH_API_URL: ${SIGNALMASH_API_URL:-https://api.signalmash.com}
      GHL_APP_CLIENT_ID: ${GHL_APP_CLIENT_ID}
      GHL_APP_CLIENT_SECRET: ${GHL_APP_CLIENT_SECRET}
      GHL_APP_REDIRECT_URI: ${GHL_APP_REDIRECT_URI:-http://localhost:3000/oauth/callback}
      APP_URL: ${APP_URL:-http://localhost:3000}
      LOG_LEVEL: debug
    ports:
      - "3001:3001"
    volumes:
      - ./packages/server/src:/app/packages/server/src:ro
      - ./packages/shared/src:/app/packages/shared/src:ro

  # Web Frontend
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: signalmash-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: signalmash-network
