# ===========================================
# Nginx Configuration for Signalmash Connect
# ===========================================
#
# Replace YOURDOMAIN.COM with your actual domain
#
# Installation:
# 1. Copy this file: sudo cp nginx.conf /etc/nginx/sites-available/signalmash
# 2. Enable site: sudo ln -s /etc/nginx/sites-available/signalmash /etc/nginx/sites-enabled/
# 3. Test config: sudo nginx -t
# 4. Reload nginx: sudo systemctl reload nginx
# 5. Get SSL: sudo certbot --nginx -d app.YOURDOMAIN.COM -d api.YOURDOMAIN.COM

# API Server (api.yourdomain.com)
server {
    listen 80;
    server_name api.YOURDOMAIN.COM;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

# Frontend App (app.yourdomain.com)
server {
    listen 80;
    server_name app.YOURDOMAIN.COM;

    root /var/www/signalmash/packages/web/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

